# ============================================================
# HD Multimodal Fusion Experiment — Configuration
# ============================================================

paths:
  # Audio: /public/labdata/.../HDacoustic/HDXXX.wav
  audio_dir: /public/labdata/huangda/HD/Data/dataset/HD_final/HDacoustic

  # Video collections: <video_dir>/<collection>/HDXXX/*.mp4
  video_dir: /NAS/public2_data/huangda/preprocessed_audio
  video_collections:
    - A录像无量表
    - A录像+运动量表+TFC
    - HD241-HD272
    - HD272-HD309
    - 视屏编号整理（HD178开始）

  # MemTrax xlsx (one row per subject, columns = metrics)
  memtrax_xlsx: null  # TODO: fill in the actual path

  # Label xlsx: columns "sample_id" (HDXXX), "stages" (pre/1/2)
  label_xlsx: /public/labdata/huangda/HD/Data/dataset/20250610.xlsx

  # Output root
  output_dir: ./output

  # HC (healthy control) data — separate folder, no scales
  hc_audio_dir: null  # TODO: fill in if available
  hc_video_dir: /NAS/public2_data/huangda/preprocessed_audio/HC_video

# ------------------------------------------------------------
# Model configuration (via ModelScope → transformers)
# ------------------------------------------------------------
models:
  # ModelScope 下载缓存目录
  cache_dir: /public/labdata/huangda/HD/models/modelscope/models

  audio:
    # HuggingFace ID (for reference)
    hf_name: facebook/wav2vec2-base
    # ModelScope model ID (used only if local_path is null)
    ms_name: TencentGameMate/chinese-wav2vec2-base
    # Local pre-downloaded path — if set, skip ModelScope download
    local_path: /public/labdata/huangda/HD/models/modelscope/models/TencentGameMate/chinese-wav2vec2-base
    sample_rate: 16000

  video:
    hf_name: MCG-NJU/videomae-base
    # ModelScope model ID (used only when download is explicitly allowed)
    ms_name: OpenGVLab/VideoMAE2
    # Existing ModelScope snapshot; extraction is local-only by default.
    local_path: /public/labdata/huangda/HD/models/modelscope/models/OpenGVLab/VideoMAE2_clean
    # Raw checkpoint inside the OpenGVLab bundle (base encoder, 768d).
    checkpoint: mae-b/pytorch_model.bin
    frame_count: 16
    img_size: 224
    fps: null
    preferred_filename: 4.mp4

# ------------------------------------------------------------
# Sliding-window embedding extraction
# ------------------------------------------------------------
windowing:
  audio:
    mode: both              # global | windows | both
    sizes_sec: [4, 8, 16]
    overlap: 0.5
    pool: mean              # mean | mean_std
    layer: -1               # -1 = final layer; try intermediate layers separately
    min_speech_ratio: 0.2   # energy-VAD active-frame fraction
    vad_top_db: 35.0
    max_windows_per_size: 128
  video:
    mode: both
    sizes_sec: [2, 4, 8]
    overlap: 0.5
    pool: mean              # VideoMAE has no CLS token
    max_windows_per_size: 64

# ------------------------------------------------------------
# Visualization
# ------------------------------------------------------------
visualization:
  method: umap           # "umap" | "tsne" | "both"
  perplexity: 30         # t-SNE only
  n_neighbors: 15        # UMAP only
  random_state: 42

# ------------------------------------------------------------
# Fusion / classification
# ------------------------------------------------------------
fusion:
  methods: [concat]      # "concat" first; "attention" later
  test_size: 0.2
  val_size: 0.1          # from training set
  random_state: 42
  # Classification target: pre vs (1,2,3,4) — binary
  labels:
    positive: [1, 2, 3, 4]
    negative: [pre]
  # MLP hidden dims
  hidden_dims: [256, 128]
  dropout: 0.3
  batch_size: 32
  epochs: 100
  early_stopping_patience: 15
  lr: 0.001

# ------------------------------------------------------------
# Baseline ML experiments
# ------------------------------------------------------------
baseline:
  test_size: 0.2
  cv_folds: 5
  random_state: 42
  pca_variance: 0.95
  cca_components: 5
  classifiers: [svm, logistic, random_forest]
  fusion_methods: [concat, mean_prob, cca]

# ------------------------------------------------------------
# Leakage-safe subject-level experiments on window embeddings
# ------------------------------------------------------------
window_experiments:
  outer_folds: 5
  inner_folds: 4
  random_state: 42
  pca_variance: 0.95
  classifiers: [logistic, random_forest]
  aggregations: [mean, mean_std]
  min_audio_speech_ratio: 0.0
  min_video_valid_ratio: 0.0
  bootstrap_iterations: 2000
  n_jobs: -1
  # Fixed, predeclared configuration for fair fusion comparison.
  # The script uses the nearest extracted size if the exact size is absent.
  fusion_audio_window_sec: 8
  fusion_video_window_sec: 4
  fusion_aggregation: mean_std
  fusion_audio_classifier: random_forest
  fusion_video_classifier: logistic

# ------------------------------------------------------------
# Runtime
# ------------------------------------------------------------
device: cuda             # "cuda" | "cpu"
num_workers: 4
